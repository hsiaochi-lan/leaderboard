<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚔️ 積分經驗值統計系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- JF Open 粉圓字體 -->
    <link href="https://cdn.jsdelivr.net/npm/jf-openhuninn@1.0.0/dist/jf-openhuninn.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
        }

        body {
            font-family: 'jf-openhuninn', 'Noto Sans TC', 'Microsoft JhengHei', 'Segoe UI', Tahoma, sans-serif;
            font-size: 14pt;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 1280px; margin: 0 auto; }

        .header { text-align: center; color: white; margin-bottom: 28px; }
        .header h1 { font-size: 44px; text-shadow: 2px 2px 6px rgba(0,0,0,0.35); margin-bottom: 6px; }
        .header p { font-size: 14px; opacity: .88; }

        .top-bar { display: flex; justify-content: flex-end; margin-bottom: 14px; gap: 8px; }
        .refresh-btn {
            padding: 8px 18px;
            background: rgba(255,255,255,0.25);
            color: white;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            transition: all .25s;
        }
        .refresh-btn:hover { background: white; color: var(--primary); }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px;
            margin-bottom: 22px;
        }
        .stat-card {
            background: white;
            padding: 18px 14px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,.12);
        }
        .stat-number { font-size: 30px; font-weight: 700; color: var(--primary); }
        .stat-label { font-size: 11px; color: #999; margin-top: 4px; }

        .period-tabs { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        .period-btn {
            padding: 9px 18px;
            background: rgba(255,255,255,.22);
            color: white;
            border: 2px solid rgba(255,255,255,.4);
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            transition: all .25s;
        }
        .period-btn.active,
        .period-btn:hover { background: white; color: var(--primary); border-color: white; }

        .view-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .view-btn {
            padding: 10px 22px;
            background: rgba(255,255,255,.15);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            transition: all .25s;
        }
        .view-btn.active { background: white; color: var(--primary); }
        .view-btn:hover:not(.active) { background: rgba(255,255,255,.3); }

        .section-title {
            color: white;
            font-size: 19px;
            font-weight: 700;
            margin: 20px 0 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .table-wrapper {
            background: white;
            border-radius: 12px;
            overflow-x: auto;
            box-shadow: 0 8px 28px rgba(0,0,0,.18);
            margin-bottom: 24px;
        }
        table { width: 100%; border-collapse: collapse; min-width: 580px; }
        thead { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; }
        th { padding: 13px 15px; text-align: left; font-size: 13px; font-weight: 600; white-space: nowrap; }
        td { padding: 13px 15px; border-bottom: 1px solid #f0f0f0; font-size: 14px; vertical-align: middle; }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: #f6f8ff; }
        tbody tr.rank-1 { background: linear-gradient(90deg, #fffef0, white); }
        tbody tr.rank-2 { background: linear-gradient(90deg, #f7f7f7, white); }
        tbody tr.rank-3 { background: linear-gradient(90deg, #fff9f0, white); }

        .rank-icon { font-size: 22px; }
        .rank-num  { font-weight: 700; color: var(--primary); font-size: 15px; }

        .player-name  { font-weight: 600; font-size: 15px; }
        .player-team  { font-size: 12px; color: #888; margin-top: 2px; }

        .xp-total { font-weight: 700; color: var(--primary); font-size: 16px; }
        .xp-breakdown { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 4px; }
        .xp-chip {
            font-size: 11px;
            background: #f0f2ff;
            color: #555;
            padding: 2px 7px;
            border-radius: 10px;
            white-space: nowrap;
        }

        .level-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 5px 13px;
            border-radius: 20px;
            color: white;
            font-weight: 700;
            font-size: 12px;
            white-space: nowrap;
        }

        .xp-progress {
            background: #eee;
            border-radius: 4px;
            height: 5px;
            margin-top: 5px;

        }
        .xp-progress-bar {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--primary), var(--primary-dark));
        }
        .xp-next { font-size: 11px; color: #aaa; margin-top: 3px; }

        .awards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;

        }
        .award-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;

        .award-header {

        .award-stat { font-size: 14px; color: #555; margin: 6px 0; }
        .award-stat strong { color: var(--primary); }

        .loading { text-align: center; padding: 60px 20px; color: white; }
        .spinner {

        .error-box {

        .debug-panel {

        }
        .debug-panel.show { display: block; }
        .debug-toggle {
            padding: 6px 14px;
            background: rgba(255,255,255,0.15);
            color: rgba(255,255,255,.7);
            border: 1px solid rgba(255,255,255,.3);
            border-radius: 15px;
            cursor: pointer;
            font-size: 11px;
            font-family: inherit;

            text-align: center;

<body>
<div class="container">

    <div class="header">
        <h1>⚔️ 每月榮耀排行榜</h1>
        <p>升級攀越更高榮耀 • 每一次升級，都是你走向王者的證明！</p>
    </div>

    <div class="top-bar">
        <button class="debug-toggle" onclick="toggleDebug()">🐛 Debug</button>
        <button class="refresh-btn" onclick="loadData()">🔄 重新整理</button>
    </div>

    <div class="debug-panel" id="debugPanel"></div>

    <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-number">-</div><div class="stat-label">參與人數</div></div>
        <div class="stat-card"><div class="stat-number">-</div><div class="stat-label">總經驗值 XP</div></div>
        <div class="stat-card"><div class="stat-number">-</div><div class="stat-label">個人最高 XP</div></div>
        <div class="stat-card"><div class="stat-number">-</div><div class="stat-label">參與戰隊數</div></div>
    </div>

    <div class="period-tabs">
        <button class="period-btn active" onclick="selectPeriod('all',this)">📊 累計 5～9月</button>
        <button class="period-btn" onclick="selectPeriod(5,this)">5月</button>
        <button class="period-btn" onclick="selectPeriod(6,this)">6月</button>
        <button class="period-btn" onclick="selectPeriod(7,this)">7月</button>
        <button class="period-btn" onclick="selectPeriod(8,this)">8月</button>
        <button class="period-btn" onclick="selectPeriod(9,this)">9月</button>
    </div>

    <div class="view-tabs">
        <button class="view-btn active" onclick="selectView('personal',this)">👤 個人排行</button>
        <button class="view-btn" onclick="selectView('team',this)">🏆 團隊排行</button>
        <button class="view-btn" onclick="selectView('awards',this)">⭐ 月份獎項</button>
    </div>

    <div id="content">
        <div class="loading">
            <div class="spinner"></div>
            <p>正在讀取 Google Sheets 資料…</p>
        </div>
    </div>

    <div class="footer">
        <p id="updateTime"></p>
        <p>🎮 積分經驗值統計系統 v4.0 (CSV mode)</p>
    </div>

</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  CONFIGURATION — 與 PHP 版完全對齊，使用 CSV export + 硬編碼索引
// ═══════════════════════════════════════════════════════════════

// CSV export URL（跟 PHP 版用的同一個）
const CSV_URL = 'https://docs.google.com/spreadsheets/d/1slQMwj1QvX6UwSqDVu4uC6ImaQFEjKn8NLMFYtypYD8/export?format=csv&gid=1724057964';

// ── 欄位索引（0-based，與 PHP 版一致）──
// 0:  時間戳記
// 1:  參賽組別
// 2~11: 各組姓名欄 (明杰組、佩蘭組、依雯組、家齊組、慧芳組、慧貞組、Mary組、Christine組、Adrian組、James&Melody組)
// 12: 零售的 BV 產品點數（純統計）
// 13: 面對面商展
// 14: 自己主辦的健康講座
// 15: 一對一諮詢或保養
// 16: 自己成功招募
// 17: 新簽約的夥伴成功招募
// 18: 遠晟組_姓名 (第1欄)
// 19: 遠晟組_姓名 (第2欄)
// 20: 遠晟組_姓名 (第3欄)
// 21: 零售超過100BV產品次數

const COL = {
    date:       0,
    teamSelect: 1,
    nameStart:  2,   // 姓名欄起始
    nameEnd:    11,  // 姓名欄結束
    bv:         12,
    exhibition: 13,
    seminar:    14,
    consult:    15,
    recruit:    16,
    newRecruit: 17,
    // 遠晟組姓名: 18, 19, 20  (也掃描)
    bvOver100:  21,
};

// XP 計算方式 — 與 PHP $scoreMap 完全對齊
const SCORE_MAP = {
    21: 10,   // 索引 21 = 零售超過100BV產品次數 → 每次 10 XP
    13: 20,   // 商展
    14: 20,   // 講座
    15: 20,   // 諮詢
    16: 100,  // 成功招募
    17: 100,  // 新夥伴招募
};

// XP 標籤
const XP_LABELS = {
    21: '💰零售100BV',
    13: '🎪商展',
    14: '📢講座',
    15: '🤝諮詢',
    16: '👥招募',
    17: '🌟新夥伴招募',
};

// ── 戰隊成員 ──
const TEAMS = {
    '明杰組':       ['明杰涵涵','伯憲阿香','佳霖亮亮','小宇'],
    '佩蘭組':       ['雪吟佩蘭','跩妹','若妍'],
    '依雯組':       ['依雯胡健','Connie','兆廷','有成','湯湯'],
    '家齊組':       ['家齊','律廷','宜庭','昱元','惠玲'],
    '遠晟組':       ['遠晟','思琪','鷥婷','怡利'],
    '慧芳組':       ['宥閑','慧芳','筱琦','茜阌','薳之'],
    '慧貞組':       ['慧貞','瑾誼','怡珊'],
    'Mary組':       ['Mary','Mui Hong','Nic','Allyson','Joe/惠云','Christine'],
    'Christine組':  ['ChristineF','Utala'],
    'Adrian組':     ['Adrian','Lynn春琳','慧儀','小芳','婉娟'],
    'James&Melody組':['J&M','Jovy'],
};

// ── 等級定義 ──
const LEVELS = [
    { lv:5, name:'王者',  minXP:2000, icon:'👑', bg:'linear-gradient(135deg,#FF4500,#FF8C00)' },
    { lv:4, name:'鑽石',  minXP:1000, icon:'💎', bg:'linear-gradient(135deg,#29B6F6,#0288D1)' },
    { lv:3, name:'黃金',  minXP: 500, icon:'✨', bg:'linear-gradient(135deg,#FFD700,#F59700)' },
    { lv:2, name:'白銀',  minXP: 200, icon:'🔘', bg:'linear-gradient(135deg,#E0E0E0,#9E9E9E)' },
    { lv:1, name:'青銅',  minXP:   0, icon:'🟤', bg:'linear-gradient(135deg,#A1887F,#5D4037)' },
];

const MONTHS = [5,6,7,8,9];

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
let currentPeriod  = 'all';
let currentView    = 'personal';
let processedData  = {};
let lastFetch      = null;
let debugLog       = [];

function dbg(msg) {
    debugLog.push(msg);
    console.log('[DBG]', msg);
    const panel = document.getElementById('debugPanel');
    if (panel) panel.innerHTML = debugLog.map(m => `<div>${m}</div>`).join('');
}
function toggleDebug() {
    document.getElementById('debugPanel').classList.toggle('show');
}

// ═══════════════════════════════════════════════════════════════
//  DATA LOADING — 用 fetch + CSV（跟 PHP 版同一招）
// ═══════════════════════════════════════════════════════════════
async function loadData() {
    debugLog = [];
    showLoading();
    dbg('開始載入 CSV 資料...');

    try {
        const resp = await fetch(CSV_URL);
        if (!resp.ok) throw new Error(`HTTP ${resp.status} — 可能是試算表未公開或 URL 有誤`);

        const text = await resp.text();
        dbg(`CSV 下載成功，大小: ${text.length} bytes`);

        const rows = parseCSV(text);
        dbg(`CSV 解析完成，共 ${rows.length} 列（含標頭）`);

        if (rows.length < 2) throw new Error('CSV 內容為空或只有標頭');

        // 第一列是標頭，跳過
        const header = rows[0];
        dbg(`標頭: ${header.slice(0,6).join(' | ')} ...共 ${header.length} 欄`);

        const dataRows = rows.slice(1);
        const parsed = parseRows(dataRows);
        dbg(`有效資料: ${parsed.length} 筆`);

        processedData = buildAllPeriods(parsed);
        lastFetch = new Date();
        render();

    } catch(e) {
        dbg(`❌ ${e.message}`);
        showError('讀取失敗', e.message +
            '<br><br>請確認：<br>① Google Sheets 已「發佈到網路」或設為「知道連結的人皆可檢視」<br>' +
            '② 如果在本機開啟 HTML，某些瀏覽器可能擋 CORS<br>' +
            '③ 建議部署到 GitHub Pages 或任何 https 伺服器');
        console.error(e);
    }
}

// ═══════════════════════════════════════════════════════════════
//  CSV PARSER — 處理引號內的逗號和換行
// ═══════════════════════════════════════════════════════════════
function parseCSV(text) {
    const rows = [];
    let current = [];
    let cell = '';
    let inQuotes = false;

    for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        const next = text[i + 1];

        if (inQuotes) {
            if (ch === '"' && next === '"') {
                cell += '"';
                i++; // skip escaped quote
            } else if (ch === '"') {
                inQuotes = false;
            } else {
                cell += ch;
            }
        } else {
            if (ch === '"') {
                inQuotes = true;
            } else if (ch === ',') {
                current.push(cell);
                cell = '';
            } else if (ch === '\n' || (ch === '\r' && next === '\n')) {
                current.push(cell);
                cell = '';
                if (current.some(c => c.trim() !== '')) rows.push(current);
                current = [];
                if (ch === '\r') i++; // skip \n after \r
            } else if (ch === '\r') {
                current.push(cell);
                cell = '';
                if (current.some(c => c.trim() !== '')) rows.push(current);
                current = [];
            } else {
                cell += ch;
            }
        }
    }
    // last row
    current.push(cell);
    if (current.some(c => c.trim() !== '')) rows.push(current);

    return rows;
}

// ═══════════════════════════════════════════════════════════════
//  ROW PARSER — 與 PHP 版邏輯完全對齊（硬編碼索引）
// ═══════════════════════════════════════════════════════════════
function parseRows(dataRows) {
    const results = [];

    dataRows.forEach((data, rowIdx) => {
        // 1. 解析日期（處理中文 上午/下午）
        const rawDate = (data[COL.date] || '').trim();
        if (!rawDate) return;

        const month = extractMonth(rawDate);
        if (!month) {
            if (rowIdx < 3) dbg(`⚠️ Row ${rowIdx}: 日期解析失敗 "${rawDate}"`);
            return;
        }

        // 2. 找姓名 — 掃描索引 2~11（跟 PHP 的 for $i=2; $i<=11 一模一樣）
        //    另外也掃 18~20（遠晟組姓名）
        const teamName = (data[COL.teamSelect] || '').trim();
        let playerName = '';

        for (let i = COL.nameStart; i <= COL.nameEnd; i++) {
            const val = (data[i] || '').trim();
            if (val) { playerName = val; break; }
        }
        // 如果 2~11 沒找到，掃遠晟組 18~20
        if (!playerName) {
            for (let i = 18; i <= 20; i++) {
                const val = (data[i] || '').trim();
                if (val) { playerName = val; break; }
            }
        }

        if (!playerName) return;

        // 3. 計算 XP — 與 PHP $scoreMap 完全對齊
        let totalXP = 0;
        const breakdown = {};

        for (const [idxStr, multiplier] of Object.entries(SCORE_MAP)) {
            const idx = parseInt(idxStr);
            const count = parseFloat(data[idx] || '0') || 0;
            const xpVal = count * multiplier;
            if (xpVal > 0) {
                breakdown[XP_LABELS[idx] || `col${idx}`] = { count, multiplier, total: xpVal };
                totalXP += xpVal;
            }
        }

        // BV（純統計用）
        const bv = parseFloat(data[COL.bv] || '0') || 0;

        const entry = {
            month, name: playerName, team: teamName,
            bv, totalXP, breakdown,
        };

        if (rowIdx < 3) dbg(`✓ Row ${rowIdx}: ${playerName} (${teamName}) XP=${totalXP} BV=${bv}`);
        results.push(entry);
    });

    return results;
}

function extractMonth(rawDate) {
    // "2026/5/4 下午 5:06:11" → 用正則取 YYYY/MM/DD
    const m = rawDate.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
    if (m) return parseInt(m[2]);

    // Fallback: MM/DD/YYYY
    const m2 = rawDate.match(/^(\d{1,2})[\/\-]\d{1,2}[\/\-]\d{4}/);
    if (m2) return parseInt(m2[1]);

    return null;
}

// ═══════════════════════════════════════════════════════════════
//  DATA PROCESSING
// ═══════════════════════════════════════════════════════════════
function buildAllPeriods(rows) {
    const result = {};
    ['all', ...MONTHS].forEach(p => {
        const sub = p === 'all' ? rows : rows.filter(r => r.month === p);
        result[p] = buildPeriod(sub);
    });
    return result;
}

function buildPeriod(rows) {
    // Aggregate per person
    const agg = {};
    rows.forEach(r => {
        if (!agg[r.name]) agg[r.name] = { bv:0, totalXP:0, breakdown:{}, team: r.team };
        const a = agg[r.name];
        a.bv      += r.bv;
        a.totalXP += r.totalXP;
        // merge breakdown
        for (const [label, info] of Object.entries(r.breakdown)) {
            if (!a.breakdown[label]) a.breakdown[label] = { count:0, multiplier: info.multiplier, total:0 };
            a.breakdown[label].count += info.count;
            a.breakdown[label].total += info.total;
        }
    });

    // Build person list
    const persons = Object.entries(agg).map(([name, s]) => {
        const team = findTeam(name, s.team);
        // 計算 BV 換算成 XP（每 100BV = 10XP）
        const bvToXp = Math.floor(s.bv / 100) * 10;
        // 將 BV 換算的 XP 加入 breakdown
        if (bvToXp > 0) {
            s.breakdown['💰零售'] = { count: Math.floor(s.bv / 100), multiplier: 10, total: bvToXp };
        }
        // 將 BV 換算的 XP 加入總 XP
        const totalXp = s.totalXP + bvToXp;
        return { name, team, bv: s.bv, xp: totalXp, breakdown: s.breakdown, level: getLevel(totalXp) };
    }).sort((a,b) => b.xp - a.xp);

    // Build team stats
    const teams = Object.entries(TEAMS).map(([tname, members]) => {
        const t = { name: tname, members, totalXP:0, totalBV:0, totalRecruit:0,
                    xpBreakdown:{ retail:0, activity:0, recruit:0 }, activeCount:0 };
        persons.filter(p => p.team === tname).forEach(p => {
            t.totalXP += p.xp;
            t.totalBV += p.bv;
            // sum recruit counts
            const recruitXP = (p.breakdown['👥招募']?.total || 0) + (p.breakdown['🌟新夥伴招募']?.total || 0);
            const recruitCount = (p.breakdown['👥招募']?.count || 0) + (p.breakdown['🌟新夥伴招募']?.count || 0);
            t.totalRecruit += recruitCount;
            t.xpBreakdown.retail   += (p.breakdown['💰零售']?.total || 0);
            t.xpBreakdown.activity += (p.breakdown['🎪商展']?.total || 0) + (p.breakdown['📢講座']?.total || 0) + (p.breakdown['🤝諮詢']?.total || 0);
            t.xpBreakdown.recruit  += recruitXP;
            t.activeCount++;
        });
        return t;
    }).sort((a,b) => b.totalXP - a.totalXP);

    return { persons, teams };
}

function findTeam(name, teamHint) {
    for (const [tname, members] of Object.entries(TEAMS)) {
        if (members.some(m =>
            m.toLowerCase() === name.toLowerCase() ||
            name.includes(m) || m.includes(name)
        )) return tname;
    }
    // Fallback: use the teamSelect column value
    if (teamHint) {
        for (const tname of Object.keys(TEAMS)) {
            if (tname === teamHint || tname.includes(teamHint) || teamHint.includes(tname)) return tname;
        }
        return teamHint;
    }
    return '未分組';
}

function getLevel(xp) {
    return LEVELS.find(l => xp >= l.minXP) || LEVELS[LEVELS.length - 1];
}

function nextLevel(xp) {
    for (let i = LEVELS.length - 1; i >= 0; i--) {
        if (LEVELS[i].minXP > xp) return LEVELS[i];
    }
    return null;
}

// ═══════════════════════════════════════════════════════════════
//  RENDERING
// ═══════════════════════════════════════════════════════════════
function render() {
    const data = processedData[currentPeriod];
    if (!data) {
        document.getElementById('content').innerHTML = '<div class="no-data">此期間尚無資料</div>';
        return;
    }
    renderStats(data);
    if (currentView === 'personal') renderPersonal(data);
    else if (currentView === 'team')  renderTeam(data);
    else                              renderAwards(data);
    updateFooter();
}

function renderStats({ persons, teams }) {
    const totalXP = persons.reduce((s,p) => s + p.xp, 0);
    const maxXP   = persons.length ? persons[0].xp : 0;
    const activeTeams = teams.filter(t => t.totalXP > 0).length;
    document.getElementById('statsGrid').innerHTML =
        statCard(persons.length, '參與人數') +
        statCard(totalXP.toLocaleString(), '總經驗值 XP') +
        statCard(maxXP.toLocaleString(), '個人最高 XP') +
        statCard(activeTeams, '參與戰隊數');
}

function statCard(num, label) {
    return `<div class="stat-card"><div class="stat-number">${num}</div><div class="stat-label">${label}</div></div>`;
}

function rankCell(i) {
    if (i === 0) return '<td><span class="rank-icon">🥇</span></td>';
    if (i === 1) return '<td><span class="rank-icon">🥈</span></td>';
    if (i === 2) return '<td><span class="rank-icon">🥉</span></td>';
    return `<td><span class="rank-num">${i+1}</span></td>`;
}

function badge(level) {
    return `<span class="level-badge" style="background:${level.bg}">${level.icon} Lv.${level.lv} ${level.name}</span>`;
}

function xpBar(xp) {
    const nl = nextLevel(xp);
    if (!nl) return '';
    const cur = getLevel(xp);
    const pct = Math.min(100, Math.round(((xp - cur.minXP) / (nl.minXP - cur.minXP)) * 100));
    return `<div class="xp-progress"><div class="xp-progress-bar" style="width:${pct}%"></div></div>
            <div class="xp-next">距下一級 ${nl.name}：還差 ${nl.minXP - xp} XP</div>`;
}

function chip(txt) { return `<span class="xp-chip">${txt}</span>`; }

// ── Personal view ──
function renderPersonal({ persons }) {
    const rows = persons.map((p, i) => {
        const chips = Object.entries(p.breakdown)
            .filter(([,v]) => v.total > 0)
            .map(([label, v]) => chip(`${label} ${v.total}`))
            .join('');

        return `<tr class="${i<3?'rank-'+(i+1):''}">
            ${rankCell(i)}
            <td>
                <div class="player-name">${p.name}</div>
                <div class="player-team">${p.team}</div>
            </td>
            <td style="text-align: center; font-weight: 600; color: #e67e22;">
                ${p.bv.toLocaleString()} BV
            </td>
            <td>
                <div class="xp-total">${p.xp.toLocaleString()} XP</div>
                <div class="xp-breakdown">${chips}</div>
            </td>
            <td>
                ${badge(p.level)}
                ${xpBar(p.xp)}
            </td>
        </tr>`;
    }).join('');

    document.getElementById('content').innerHTML = `
        <div class="section-title">👤 個人排行榜</div>
        <div class="table-wrapper">
            <table>
                <thead><tr>
                    <th style="width:55px">排名</th>
                    <th>姓名／戰隊</th>
                    <th style="width:110px">累積 BV</th>
                    <th>經驗值 XP（各項明細）</th>
                    <th style="width:170px">等級</th>
                </tr></thead>
                <tbody>
                    ${persons.length ? rows : '<tr><td colspan="5" class="no-data">此期間尚無資料</td></tr>'}
                </tbody>
            </table>
        </div>`;
}

// ── Team view ──
function renderTeam({ teams }) {
    const rows = teams.map((t, i) => {
        const avg = t.activeCount ? Math.round(t.totalXP / t.activeCount) : 0;
        const chips = [
            t.xpBreakdown.retail   > 0 ? chip(`💰零售 ${t.xpBreakdown.retail}`) : '',
            t.xpBreakdown.activity > 0 ? chip(`🎯活動 ${t.xpBreakdown.activity}`) : '',
            t.xpBreakdown.recruit  > 0 ? chip(`👥招募 ${t.xpBreakdown.recruit}`) : '',
        ].join('');

        return `<tr class="${i<3?'rank-'+(i+1):''}">
            ${rankCell(i)}
            <td>
                <div class="player-name">${t.name}</div>
                <div class="player-team">成員：${t.members.join('、')}</div>
            </td>
            <td>${t.activeCount} / ${t.members.length}</td>
            <td style="text-align: center; font-weight: 600; color: #e67e22;">
                ${t.totalBV.toLocaleString()} BV
            </td>
            <td>
                <div class="xp-total">${t.totalXP.toLocaleString()} XP</div>
                <div class="xp-breakdown">${chips}</div>
            </td>
            <td class="xp-total">${avg.toLocaleString()}</td>
        </tr>`;
    }).join('');

    document.getElementById('content').innerHTML = `
        <div class="section-title">🏆 團隊排行榜</div>
        <div class="table-wrapper">
            <table>
                <thead><tr>
                    <th style="width:55px">排名</th>
                    <th>戰隊名稱</th>
                    <th style="width:95px">參與人數</th>
                    <th style="width:110px">總 BV</th>
                    <th>總積分 XP（各項明細）</th>
                    <th style="width:95px">平均 XP</th>
                </tr></thead>
                <tbody>
                    ${teams.length ? rows : '<tr><td colspan="6" class="no-data">此期間尚無資料</td></tr>'}
                </tbody>
            </table>
        </div>`;
}

// ── Awards view ──
function renderAwards({ teams }) {
    const active = teams.filter(t => t.totalXP > 0);
    const period = currentPeriod === 'all' ? '5～9月累計' : `${currentPeriod}月`;

    if (!active.length) {
        document.getElementById('content').innerHTML =
            `<div style="color:white;text-align:center;padding:50px;font-size:18px">📭 ${period} 尚無資料</div>`;
        return;
    }

    const byXP      = [...teams].sort((a,b) => b.totalXP - a.totalXP);
    const byBV      = [...teams].sort((a,b) => b.totalBV - a.totalBV);
    const byRecruit = [...teams].sort((a,b) => b.totalRecruit - a.totalRecruit);

    const strongest   = byXP[0];
    const retailKing  = byBV[0];
    const recruitKing = byRecruit[0];

    const rankIcons = ['🥇','🥈','🥉'];
    const top3Rows = [0,1,2].map(i => `
        <tr class="${i<3?'rank-'+(i+1):''}">
            <td><span class="rank-icon">${rankIcons[i]}</span></td>
            <td>${byXP[i]?.totalXP ? `<strong>${byXP[i].name}</strong> <span style="color:#888;font-size:12px">(${byXP[i].totalXP.toLocaleString()} XP)</span>` : '-'}</td>
            <td>${byBV[i]?.totalBV ? `<strong>${byBV[i].name}</strong> <span style="color:#888;font-size:12px">(${byBV[i].totalBV.toLocaleString()} BV)</span>` : '-'}</td>
            <td>${byRecruit[i]?.totalRecruit ? `<strong>${byRecruit[i].name}</strong> <span style="color:#888;font-size:12px">(${byRecruit[i].totalRecruit} 人)</span>` : '-'}</td>
        </tr>`).join('');

    document.getElementById('content').innerHTML = `
        <div class="section-title">⭐ ${period} 月份獎項</div>
        <div class="awards-grid">
            ${awardCard('🏆 最強戰隊','linear-gradient(135deg,#FFD700,#FFA500)', strongest, '🎮 XP 最高戰隊',
                `<p class="award-stat">📊 總積分：<strong>${strongest.totalXP.toLocaleString()} XP</strong></p>
                 <p class="award-stat">📈 平均積分：<strong>${Math.round(strongest.totalXP/(strongest.activeCount||1)).toLocaleString()} XP</strong></p>
                 <p class="award-stat">👥 參與人數：<strong>${strongest.activeCount}</strong></p>`)}
            ${awardCard('💰 零售王戰隊','linear-gradient(135deg,#43A047,#1B5E20)', retailKing, '💼 零售 BV 最高戰隊',
                `<p class="award-stat">💵 總零售 BV：<strong>${retailKing.totalBV.toLocaleString()}</strong></p>
                 <p class="award-stat">💰 零售 XP：<strong>${retailKing.xpBreakdown.retail.toLocaleString()} XP</strong></p>
                 <p class="award-stat">👥 參與人數：<strong>${retailKing.activeCount}</strong></p>`)}
            ${awardCard('👥 招募王戰隊','linear-gradient(135deg,#9C27B0,#4A148C)', recruitKing, '🤝 招募人數最多戰隊',
                `<p class="award-stat">👫 總招募人數：<strong>${recruitKing.totalRecruit} 人</strong></p>
                 <p class="award-stat">💫 招募 XP：<strong>${recruitKing.xpBreakdown.recruit.toLocaleString()} XP</strong></p>
                 <p class="award-stat">👥 參與人數：<strong>${recruitKing.activeCount}</strong></p>`)}
        </div>
        <div class="section-title">📊 各項目前三名對照</div>
        <div class="table-wrapper">
            <table>
                <thead><tr>
                    <th style="width:55px">排名</th>
                    <th>🏆 最強戰隊（XP 最高）</th>
                    <th>💰 零售王（BV 最高）</th>
                    <th>👥 招募王（招募最多）</th>
                </tr></thead>
                <tbody>${top3Rows}</tbody>
            </table>
        </div>`;
}

function awardCard(title, bg, team, subtitle, statsHTML) {
    return `<div class="award-card">
        <div class="award-header" style="background:${bg}">${title}</div>
        <div class="award-body">
            <div class="award-team-name">${team ? team.name : '—'}</div>
            <p class="award-stat" style="color:#888;margin-bottom:8px">${subtitle}</p>
            ${statsHTML}
        </div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════════════════════
function selectPeriod(p, btn) {
    currentPeriod = p;
    document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
}

function selectView(v, btn) {
    currentView = v;
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
}

function showLoading() {
    document.getElementById('content').innerHTML = `
        <div class="loading"><div class="spinner"></div><p>正在讀取 Google Sheets 資料…</p></div>`;
}

function showError(title, detail) {
    document.getElementById('content').innerHTML = `
        <div class="error-box">
            <h3>⚠️ ${title}</h3>
            <p>${detail}</p>
            <button class="retry-btn" onclick="loadData()">🔄 重新嘗試</button>
        </div>`;
}

function updateFooter() {
    if (lastFetch) {
        document.getElementById('updateTime').textContent =
            '⏰ 更新時間：' + lastFetch.toLocaleString('zh-TW');
    }
}

// ── Init ──
loadData();
</script>

</html>
